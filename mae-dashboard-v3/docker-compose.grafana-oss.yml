services:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: mae-grafana-oss
    ports:
      - "3000:3000"
    environment:
      # Required for iframe embedding (Grafana Cloud does not allow this)
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  grafana_data:

